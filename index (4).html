<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2E86AB">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FlowLink">
    <link rel="apple-touch-icon" href="https://storage.googleapis.com/gemynd-public/projects/flowlink/fl-icon-192.png">
    <title>FlowLink — Device Connectivity Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              cricket: {
                green: '#10b981',
                deeper: '#059669',
                glow: 'rgba(16, 185, 129, 0.4)',
              },
              solaris: {
                gold: '#2dd4bf',
                glow: 'rgba(45, 212, 191, 0.4)',
              },
              slate: {
                850: '#151e2e',
                950: '#020617',
              }
            },
            boxShadow: {
              'premium': '0 1px 3px rgba(0, 0, 0, 0.3)',
              'premium-dark': '0 10px 30px -5px rgba(0, 0, 0, 0.5)',
              'inner-glass': 'inset 0 0 10px rgba(255, 255, 255, 0.02)',
            },
            animation: {
              'marquee': 'marquee 45s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'slow-spin': 'spin 8s linear infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(100%)' },
                '100%': { transform: 'translateX(-100%)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        overscroll-behavior-y: contain;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        background-image: 
          radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 40%),
          radial-gradient(at 100% 100%, rgba(45, 212, 191, 0.05) 0px, transparent 40%);
        background-attachment: fixed;
        overscroll-behavior-y: none;
      }
      .solaris-glass {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.4);
      }
      .glass-panel {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .shadow-glow-emerald { box-shadow: none !important; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.2); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(16, 185, 129, 0.4); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.93.1",
    "jspdf": "https://esm.sh/jspdf@^4.0.0",
    "jspdf-autotable": "https://esm.sh/jspdf-autotable@^5.0.7"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
